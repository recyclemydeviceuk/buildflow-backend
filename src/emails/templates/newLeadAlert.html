<!doctype html>
<html lang="en">
  <body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,sans-serif;color:#0f172a;">
    <div style="max-width:640px;margin:0 auto;padding:32px 20px;">
      <div style="background:#ffffff;border:1px solid #e2e8f0;border-radius:20px;padding:32px;">
        <p style="margin:0 0 12px;font-size:14px;color:#64748b;">BuildFlow Notifications</p>
        <h1 style="margin:0 0 16px;font-size:24px;line-height:1.3;">A new lead has entered BuildFlow</h1>
        <p style="margin:0 0 24px;font-size:15px;line-height:1.7;">Hi {{name}}, a new lead is ready for review.</p>

        <div style="border:1px solid #dbeafe;background:#eff6ff;border-radius:18px;padding:20px;">
          <p style="margin:0 0 10px;font-size:13px;color:#1d4ed8;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;">Lead Details</p>
          <p style="margin:0 0 8px;font-size:15px;"><strong>Name:</strong> {{leadName}}</p>
          <p style="margin:0 0 8px;font-size:15px;"><strong>Phone:</strong> {{phone}}</p>
          <p style="margin:0 0 8px;font-size:15px;"><strong>City:</strong> {{city}}</p>
          <p style="margin:0;font-size:15px;"><strong>Source:</strong> {{source}}</p>
        </div>

        <div style="margin-top:28px;">
          <a href="{{leadUrl}}" style="display:inline-block;padding:12px 18px;background:#1d4ed8;color:#ffffff;text-decoration:none;border-radius:12px;font-weight:700;">
            Open Lead
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
