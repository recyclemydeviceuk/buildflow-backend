<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Login</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:4px;overflow:hidden;">

          <tr>
            <td style="background:#1a56db;padding:28px 40px;">
              <span style="font-size:20px;font-weight:700;color:#ffffff;letter-spacing:0.5px;">BuildFlow</span>
            </td>
          </tr>

          <tr>
            <td style="padding:40px;color:#1a1a1a;">
              <p style="margin:0 0 16px;font-size:15px;">Hello {{name}},</p>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.6;">A new login to your account was detected.</p>

              <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f4ff;border-left:4px solid #1a56db;border-radius:2px;margin:0 0 24px;">
                <tr>
                  <td style="padding:16px 20px;">
                    <p style="margin:0 0 4px;font-size:13px;color:#4b5563;">Time: {{loginAt}}</p>
                    <p style="margin:0 0 4px;font-size:13px;color:#4b5563;">IP Address: {{ipAddress}}</p>
                    <p style="margin:0;font-size:13px;color:#4b5563;">Device: {{userAgent}}</p>
                  </td>
                </tr>
              </table>

              <p style="margin:0;font-size:13px;color:#6b7280;">If this was not you, reset your password immediately.</p>
            </td>
          </tr>

          <tr>
            <td style="padding:20px 40px;border-top:1px solid #e5e7eb;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">BuildFlow &mdash; CRM Platform</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
