<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Digest</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:4px;overflow:hidden;">

          <tr>
            <td style="background:#1a56db;padding:28px 40px;">
              <span style="font-size:20px;font-weight:700;color:#ffffff;letter-spacing:0.5px;">BuildFlow</span>
            </td>
          </tr>

          <tr>
            <td style="padding:40px;color:#1a1a1a;">
              <p style="margin:0 0 16px;font-size:15px;">Hello {{name}},</p>
              <p style="margin:0 0 24px;font-size:15px;">Here is your summary for today.</p>

              <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e5e7eb;border-radius:4px;margin:0 0 24px;">
                <tr style="background:#f0f4ff;">
                  <td style="padding:12px 20px;font-size:13px;font-weight:600;color:#1a1a1a;border-bottom:1px solid #e5e7eb;">Metric</td>
                  <td style="padding:12px 20px;font-size:13px;font-weight:600;color:#1a1a1a;border-bottom:1px solid #e5e7eb;text-align:right;">Today</td>
                </tr>
                <tr>
                  <td style="padding:12px 20px;font-size:14px;color:#374151;border-bottom:1px solid #e5e7eb;">Calls Made</td>
                  <td style="padding:12px 20px;font-size:14px;color:#1a1a1a;font-weight:600;text-align:right;border-bottom:1px solid #e5e7eb;">{{callsToday}}</td>
                </tr>
                <tr>
                  <td style="padding:12px 20px;font-size:14px;color:#374151;border-bottom:1px solid #e5e7eb;">Connected</td>
                  <td style="padding:12px 20px;font-size:14px;color:#1a1a1a;font-weight:600;text-align:right;border-bottom:1px solid #e5e7eb;">{{connectedCalls}}</td>
                </tr>
                <tr>
                  <td style="padding:12px 20px;font-size:14px;color:#374151;border-bottom:1px solid #e5e7eb;">Ignored Reminders</td>
                  <td style="padding:12px 20px;font-size:14px;color:#1a1a1a;font-weight:600;text-align:right;border-bottom:1px solid #e5e7eb;">{{overdueReminders}}</td>
                </tr>
                <tr>
                  <td style="padding:12px 20px;font-size:14px;color:#374151;">New Leads Assigned</td>
                  <td style="padding:12px 20px;font-size:14px;color:#1a1a1a;font-weight:600;text-align:right;">{{newLeads}}</td>
                </tr>
              </table>

              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:#1a56db;border-radius:4px;">
                    <a href="{{dashboardUrl}}" style="display:inline-block;padding:12px 28px;color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;">Open Dashboard</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:20px 40px;border-top:1px solid #e5e7eb;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">BuildFlow &mdash; CRM Platform</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
